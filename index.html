function ChevronRight() {
  return h('svg', { width:11, height:18, viewBox:"0 0 8 13", fill:"none" },
    h('path', { d:"M1 1L7 6.5L1 12", stroke:"#C7C7CC", strokeWidth:1.5, strokeLinecap:"round", strokeLinejoin:"round" })
  );
}
function ChevronLeft() {
  return h('svg', { width:8, height:13, viewBox:"0 0 8 13", fill:"none" },
    h('path', { d:"M7 1L1 6.5L7 12", stroke:C.blue, strokeWidth:1.5, strokeLinecap:"round", strokeLinejoin:"round" })
  );
}
function InfoIcon() {
  return h('svg', { width:17, height:17, viewBox:"0 0 17 17", fill:"none", style:{ verticalAlign:"middle", marginLeft:3, marginRight:-2, flexShrink:0 } },
    h('circle', { cx:8.5, cy:8.5, r:7.5, stroke:"#4A7FD4", strokeWidth:1, fill:"white" }),
    h('text', { x:8.5, y:13, textAnchor:"middle", fontSize:13, fill:"#4A7FD4", fontFamily:"-apple-system, Helvetica Neue, sans-serif", fontWeight:"400" }, "?")
  );
}

function YearPage({ years, onSelect, onConfig }) {
  return h('div', { style: S.page },

      h('span', { style:{ ...S.navBtn, color:C.blue }, onClick: onConfig }, "配置"),
      h('span', { style: S.navTitle }, "选择年份"),
      h('span', { style:{ ...S.navBtn, color:"transparent" } }, "配置")

    h('div', { style:{ flex:1, overflowY:"auto", background:C.bg, paddingTop:8 } },
      h('div', { style: S.listSection },
        years.map((y, i) => h('div', { key: y },
          h('div', { style: S.yearRow, onClick: () => onSelect(y) },
            h('span', { style: S.yearLabel }, `${y}年度`),
            h(ChevronRight)
          ),
          i < years.length - 1 ? h('div', { style: S.insetSep }) : null
        ))
      )
    )
  );
}

function DetailPage({ data, onBack }) {
  if (!data) return null;
  const { summary, records } = data;
  return h('div', { style: S.page },
    h('div', { style: S.navBar },
      h('span', { style:{ ...S.navBtn, color:C.blue, display:"flex", alignItems:"center", gap:2 }, onClick: onBack },

      h('span', { style: S.navTitle }, "收入纳税明细"),
      h('span', { style:{ ...S.navBtn, color:C.blue } }, "批量申诉")

    h('div', { style:{ height:11, background:C.bg, flexShrink:0 } }),
    h('div', { style: S.summaryBox },
      h('div', { style:{ ...S.summaryRow, paddingTop:16, paddingBottom:10 } },
        h('span', { style: S.summaryLabel }, "收入合计 ", h(InfoIcon), "："),
        h('span', { style:{ ...S.summaryValue, fontWeight:"500" } }, `${summary.totalIncome}元`)

      h('div', { style:{ height:0.5, background:C.sepLight } }),
      h('div', { style:{ ...S.summaryRow, paddingTop:11, paddingBottom:16 } },
        h('span', { style:{ ...S.summaryLabel, fontWeight:"500" } }, "已申报税额合计："),
        h('span', { style:{ ...S.summaryValue, fontWeight:"500" } }, `${summary.totalTax}元`)

    h('div', { style:{ height:13, background:C.bg, flexShrink:0 } }),
    h('div', { style:{ flex:1, overflowY:"auto", background:C.bg } },
      records.map(r => h(RecordCard, { key: r.id, record: r }))

}

function RecordCard({ record }) {
  return h(React.Fragment, null,
    h('div', { style: S.recordCard },
      h('div', { style: S.recordHeader },
        h('span', { style: S.recordType }, record.type),
        h('span', { style: S.recordMonth }, record.month)
      ),
      h('div', { style: S.recordMeta }, `所得项目小类：${record.subtype}`),
      h('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"center" } },
        h('span', { style: S.recordMeta }, `扣缴义务人：${record.payer}`),
        h(ChevronRight)
      ),
      h('div', { style: S.recordMeta }, `收入：${record.income}元`),
      h('div', { style: S.recordMeta }, `已申报税额：${record.tax}元`)
    ),
    h('div', { style:{ height:13, background:C.bg } })
  );
}

function ConfigPage({ appData, setAppData, onBack }) {
  const [view, setView] = useState("main");
  const [editingYear, setEditingYear] = useState(null);
  const [editingRecord, setEditingRecord] = useState(null);
  const [newYear, setNewYear] = useState("");
  const emptyForm = { month:"", type:"工资薪金", subtype:"", payer:"", income:"", tax:"" };
  const [form, setForm] = useState(emptyForm);
  const years = Object.keys(appData).map(Number).sort((a,b) => b-a);

  function addYear() {
    const y = parseInt(newYear);
    if (!y || appData[y]) return;
    setAppData(prev => ({ ...prev, [y]:{ summary:{ totalIncome:"0.00", totalTax:"0.00" }, records:[] } }));
    setNewYear("");
  }
  function deleteYear(y) {
    if (!window.confirm(`确认删除 ${y} 年？`)) return;
    setAppData(prev => { const n={...prev}; delete n[y]; return n; });
  }
  function saveSummary(field, val) {
    setAppData(prev => ({ ...prev, [editingYear]:{ ...prev[editingYear], summary:{ ...prev[editingYear].summary, [field]:val } } }));
  }
  function openAddRecord(y) { setEditingYear(y); setForm({...emptyForm, month:`${y}-01`}); setEditingRecord(null); setView("editRecord"); }
  function openEditRecord(y, rec) { setEditingYear(y); setForm({ month:rec.month, type:rec.type, subtype:rec.subtype, payer:rec.payer, income:rec.income, tax:rec.tax }); setEditingRecord({ year:y, id:rec.id }); setView("editRecord"); }
  function saveRecord() {
    setAppData(prev => {
      const yr = {...prev[editingYear]};
      yr.records = editingRecord ? yr.records.map(r => r.id===editingRecord.id ? {...r,...form} : r) : [{id:Date.now(),...form},...yr.records];
      return {...prev, [editingYear]:yr};
    });
    setView("editYear");
  }
  function deleteRecord(y, id) { setAppData(prev => ({ ...prev, [y]:{ ...prev[y], records:prev[y].records.filter(r=>r.id!==id) } })); }

  if (view === "main") return h('div', { style: S.page },
    h('div', { style: S.navBar },
      h('span', { style:{ ...S.navBtn, color:C.blue, display:"flex", alignItems:"center", gap:2 }, onClick: onBack }, h(ChevronLeft), " 返回"),
      h('span', { style: S.navTitle }, "数据配置"),
      h('span', { style:{ width:60 } })
    ),
    h('div', { style:{ flex:1, overflowY:"auto", background:C.bg, paddingTop:20 } },
      h('div', { style: S.configSection },
        h('div', { style: S.configLabel }, "添加年份"),
        h('div', { style: S.listSection },
          h('div', { style:{ display:"flex", alignItems:"center", padding:"0 16px", height:44, background:C.card } },
            h('input', { style: S.configInput, placeholder:"输入年份，如 2023", value:newYear, onChange:e=>setNewYear(e.target.value), type:"number" }),
            h('span', { style:{ color:C.blue, fontWeight:"500", cursor:"pointer", flexShrink:0 }, onClick: addYear }, "添加")
          )
        )
      ),
      h('div', { style: S.configSection },
        h('div', { style: S.configLabel }, "年份列表"),
        h('div', { style: S.listSection },
          years.map((y,i) => h('div', { key:y },
            h('div', { style:{ display:"flex", alignItems:"center", padding:"0 16px", height:44, background:C.card } },
              h('span', { style:{ flex:1, fontSize:17 } }, `${y}年`),
              h('span', { style:{ color:C.blue, marginRight:16, cursor:"pointer" }, onClick:()=>{ setEditingYear(y); setView("editYear"); } }, "编辑"),
              h('span', { style:{ color:C.red, cursor:"pointer" }, onClick:()=>deleteYear(y) }, "删除")
            ),
            i < years.length-1 ? h('div', { style: S.insetSep }) : null
          ))
        )
      )
    )
  );

  if (view === "editYear" && editingYear) {
    const yr = appData[editingYear];
    return h('div', { style: S.page },
      h('div', { style: S.navBar },
        h('span', { style:{ ...S.navBtn, color:C.blue, display:"flex", alignItems:"center", gap:2 }, onClick:()=>setView("main") }, h(ChevronLeft), " 返回"),
        h('span', { style: S.navTitle }, `${editingYear}年 · 编辑`),
        h('span', { style:{ width:60 } })
      ),
      h('div', { style:{ flex:1, overflowY:"auto", background:C.bg, paddingTop:20 } },
        h('div', { style: S.configSection },
          h('div', { style: S.configLabel }, "汇总数据"),
          h('div', { style: S.listSection },
            h('div', { style: S.configRow },
              h('span', { style: S.configRowLabel }, "收入合计（元）"),
              h('input', { style: S.configRowInput, value:yr.summary.totalIncome, onChange:e=>saveSummary("totalIncome",e.target.value) })
            ),
            h('div', { style: S.insetSep }),
            h('div', { style: S.configRow },
              h('span', { style: S.configRowLabel }, "已申报税额（元）"),
              h('input', { style: S.configRowInput, value:yr.summary.totalTax, onChange:e=>saveSummary("totalTax",e.target.value) })
            )
          )
        ),
        h('div', { style: S.configSection },
          h('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 } },
            h('div', { style: S.configLabel }, "月度记录"),
            h('span', { style:{ color:C.blue, fontSize:15, marginRight:16, cursor:"pointer" }, onClick:()=>openAddRecord(editingYear) }, "+ 添加")
          ),
          h('div', { style: S.listSection },
            yr.records.length === 0 ? h('div', { style:{ padding:"12px 16px", color:C.textSecondary, fontSize:15, background:C.card } }, "暂无记录") : null,
            yr.records.map((r,i) => h('div', { key:r.id },
              h('div', { style:{ display:"flex", alignItems:"center", padding:"8px 16px", background:C.card, minHeight:44 } },
                h('div', { style:{ flex:1 } },
                  h('div', { style:{ fontSize:15, fontWeight:"500" } }, `${r.month} · ${r.subtype}`),
                  h('div', { style:{ fontSize:13, color:C.textSecondary } }, `收入 ${r.income} / 税 ${r.tax}`)
                ),
                h('span', { style:{ color:C.blue, marginRight:16, cursor:"pointer", fontSize:15 }, onClick:()=>openEditRecord(editingYear,r) }, "编辑"),
                h('span', { style:{ color:C.red, cursor:"pointer", fontSize:15 }, onClick:()=>deleteRecord(editingYear,r.id) }, "删除")
              ),
              i < yr.records.length-1 ? h('div', { style: S.insetSep }) : null
            ))
          )
        )
      )
    );
  }

  if (view === "editRecord") {
    const fields = [
      { key:"month", label:"月份", placeholder:"如 2025-03" },
      { key:"type", label:"类型", placeholder:"如 工资薪金" },
      { key:"subtype", label:"所得项目小类", placeholder:"如 正常工资薪金" },
      { key:"payer", label:"扣缴义务人", placeholder:"单位名称" },
      { key:"income", label:"收入（元）", placeholder:"如 36280.00" },
      { key:"tax", label:"已申报税额（元）", placeholder:"如 1540.56" },
    ];
    return h('div', { style: S.page },
      h('div', { style: S.navBar },
        h('span', { style:{ ...S.navBtn, color:C.blue, display:"flex", alignItems:"center", gap:2 }, onClick:()=>setView("editYear") }, h(ChevronLeft), " 返回"),
        h('span', { style: S.navTitle }, editingRecord ? "编辑记录" : "添加记录"),
        h('span', { style:{ ...S.navBtn, color:C.blue }, onClick: saveRecord }, "保存")
      ),
      h('div', { style:{ flex:1, overflowY:"auto", background:C.bg, paddingTop:20 } },
        h('div', { style: S.listSection },
          fields.map((f,i) => h('div', { key:f.key },
            h('div', { style: S.configRow },
              h('span', { style:{ ...S.configRowLabel, minWidth:130 } }, f.label),
              h('input', { style: S.configRowInput, placeholder:f.placeholder, value:form[f.key], onChange:e=>setForm(prev=>({...prev,[f.key]:e.target.value})) })
            ),
            i < fields.length-1 ? h('div', { style: S.insetSep }) : null
          ))
        )
      )
    );
  }
  return null;
}

function App() {
  const [appData, setAppData] = useState(DEFAULT_DATA);
  const [page, setPage] = useState("year");
  const [selectedYear, setSelectedYear] = useState(null);
  const years = Object.keys(appData).map(Number).sort((a,b) => b-a);
  return h('div', { style:{ width:"100%", height:"100vh", background:C.bg, display:"flex", flexDirection:"column", overflow:"hidden" } },
    page === "year" && h(YearPage, { years, onSelect:(y)=>{ setSelectedYear(y); setPage("detail"); }, onConfig:()=>setPage("config") }),
    page === "detail" && h(DetailPage, { data:appData[selectedYear], onBack:()=>setPage("year") }),
    page === "config" && h(ConfigPage, { appData, setAppData, onBack:()=>setPage("year") })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
