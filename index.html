<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单消消乐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#EC4899',
                        accent: '#F59E0B',
                        board: '#F3F4F6',
                        tile1: '#3B82F6',
                        tile2: '#10B981',
                        tile3: '#EF4444',
                        tile4: '#8B5CF6',
                        tile5: '#F59E0B',
                    },
                    fontFamily: {
                        game: ['"Comic Sans MS"', '"Marker Felt"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .tile-shadow {
                box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 
                            inset 2px 2px 5px rgba(255,255,255,0.5);
            }
            .tile-shadow-selected {
                box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), 
                            inset 2px 2px 5px rgba(255,255,255,0.7),
                            0 0 0 3px #FFFFFF,
                            0 0 0 6px #4F46E5;
            }
            .board-grid {
                display: grid;
                grid-template-columns: repeat(6, minmax(0, 1fr));
                gap: 4px;
            }
            @keyframes pop {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(0); }
            }
            .pop-animation {
                animation: pop 0.3s ease-out forwards;
            }
            @keyframes slide-down {
                from { transform: translateY(-100%); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            .slide-down {
                animation: slide-down 0.2s ease-out forwards;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen font-game text-gray-800">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- 游戏标题 -->
        <header class="text-center mb-6">
            <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold text-primary mb-2">
                <i class="fa fa-gamepad mr-2"></i>欢乐消消乐
            </h1>
            <p class="text-gray-600">匹配相同图案，消除它们获得分数！</p>
        </header>
        
        <!-- 游戏信息 -->
        <div class="flex justify-between items-center mb-4 bg-white rounded-lg p-4 shadow-md">
            <div class="flex flex-col items-center">
                <span class="text-sm text-gray-500">分数</span>
                <span id="score" class="text-2xl font-bold text-accent">0</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-sm text-gray-500">时间</span>
                <span id="time" class="text-2xl font-bold text-secondary">60</span>
            </div>
            <button id="restart-btn" class="bg-primary hover:bg-primary/90 text-white py-2 px-4 rounded-full transition-all duration-300 flex items-center">
                <i class="fa fa-refresh mr-1"></i> 重新开始
            </button>
        </div>
        
        <!-- 游戏区域 -->
        <div class="bg-board rounded-xl p-4 shadow-lg mb-6">
            <div id="game-board" class="board-grid aspect-square w-full"></div>
        </div>
        
        <!-- 游戏规则 -->
        <div class="bg-white rounded-lg p-4 shadow-md">
            <h2 class="text-lg font-bold mb-2 text-primary">游戏规则</h2>
            <ul class="list-disc pl-5 text-gray-700 space-y-1 text-sm">
                <li>点击一个图案，再点击相邻的图案进行交换</li>
                <li>当三个或更多相同图案连成一线时，它们会被消除</li>
                <li>每消除一个图案获得10分</li>
                <li>在60秒内获得尽可能高的分数</li>
            </ul>
        </div>
        
        <!-- 游戏结束弹窗 -->
        <div id="game-over" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 text-center shadow-2xl transform transition-all">
                <h2 class="text-2xl font-bold text-secondary mb-2">游戏结束!</h2>
                <p class="mb-4">你的最终得分是: <span id="final-score" class="font-bold text-accent text-xl">0</span></p>
                <button id="play-again" class="bg-primary hover:bg-primary/90 text-white py-2 px-6 rounded-full transition-all duration-300">
                    再玩一次
                </button>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const config = {
            rows: 6,
            cols: 6,
            types: 5, // 图案类型数量
            timeLimit: 60, // 游戏时间(秒)
            pointsPerTile: 10 // 每个图案的分数
        };
        
        // 游戏状态
        const gameState = {
            board: [],
            score: 0,
            timeLeft: config.timeLimit,
            selectedTile: null,
            isProcessing: false,
            timer: null
        };
        
        // DOM元素
        const elements = {
            gameBoard: document.getElementById('game-board'),
            scoreDisplay: document.getElementById('score'),
            timeDisplay: document.getElementById('time'),
            restartBtn: document.getElementById('restart-btn'),
            gameOverModal: document.getElementById('game-over'),
            finalScoreDisplay: document.getElementById('final-score'),
            playAgainBtn: document.getElementById('play-again')
        };
        
        // 图案图标 (使用Font Awesome)
        const icons = [
            '<i class="fa fa-diamond text-tile1"></i>',
            '<i class="fa fa-leaf text-tile2"></i>',
            '<i class="fa fa-heart text-tile3"></i>',
            '<i class="fa fa-star text-tile4"></i>',
            '<i class="fa fa-bolt text-tile5"></i>'
        ];
        
        // 初始化游戏
        function initGame() {
            // 重置游戏状态
            gameState.board = [];
            gameState.score = 0;
            gameState.timeLeft = config.timeLimit;
            gameState.selectedTile = null;
            gameState.isProcessing = false;
            
            // 更新UI
            elements.scoreDisplay.textContent = '0';
            elements.timeDisplay.textContent = config.timeLimit;
            elements.gameBoard.innerHTML = '';
            elements.gameOverModal.classList.add('hidden');
            
            // 清除之前的计时器
            if (gameState.timer) {
                clearInterval(gameState.timer);
            }
            
            // 创建游戏板
            createBoard();
            
            // 检查并移除初始匹配
            checkAndRemoveMatches(true);
            
            // 启动计时器
            startTimer();
        }
        
        // 创建游戏板
        function createBoard() {
            for (let row = 0; row < config.rows; row++) {
                gameState.board[row] = [];
                for (let col = 0; col < config.cols; col++) {
                    // 随机生成图案类型
                    const type = Math.floor(Math.random() * config.types);
                    gameState.board[row][col] = type;
                    
                    // 创建DOM元素
                    createTile(row, col, type);
                }
            }
        }
        
        // 创建单个图案元素
        function createTile(row, col, type) {
            const tile = document.createElement('div');
            tile.className = 'bg-white rounded-lg flex items-center justify-center text-2xl cursor-pointer tile-shadow transition-all duration-200 hover:scale-105';
            tile.innerHTML = icons[type];
            tile.dataset.row = row;
            tile.dataset.col = col;
            
            // 添加点击事件
            tile.addEventListener('click', () => handleTileClick(row, col));
            
            elements.gameBoard.appendChild(tile);
        }
        
        // 处理图案点击
        function handleTileClick(row, col) {
            // 如果正在处理消除或填充，不响应点击
            if (gameState.isProcessing) return;
            
            const tile = gameState.board[row][col];
            
            // 如果没有选中的图案，选中当前图案
            if (!gameState.selectedTile) {
                gameState.selectedTile = { row, col };
                highlightSelectedTile(row, col, true);
                return;
            }
            
            // 如果点击的是已选中的图案，取消选中
            if (gameState.selectedTile.row === row && gameState.selectedTile.col === col) {
                highlightSelectedTile(row, col, false);
                gameState.selectedTile = null;
                return;
            }
            
            // 检查是否相邻
            if (isAdjacent(gameState.selectedTile, { row, col })) {
                // 交换图案
                swapTiles(gameState.selectedTile, { row, col });
                
                // 检查是否有匹配
                const matches = findMatches();
                
                if (matches.length > 0) {
                    // 有匹配，处理消除
                    highlightSelectedTile(gameState.selectedTile.row, gameState.selectedTile.col, false);
                    gameState.selectedTile = null;
                    processMatches(matches);
                } else {
                    // 没有匹配，交换回来
                    setTimeout(() => {
                        swapTiles({ row, col }, gameState.selectedTile);
                        highlightSelectedTile(gameState.selectedTile.row, gameState.selectedTile.col, false);
                        gameState.selectedTile = null;
                    }, 300);
                }
            } else {
                // 不相邻，选中新的图案
                highlightSelectedTile(gameState.selectedTile.row, gameState.selectedTile.col, false);
                gameState.selectedTile = { row, col };
                highlightSelectedTile(row, col, true);
            }
        }
        
        // 高亮选中的图案
        function highlightSelectedTile(row, col, isSelected) {
            const tileElement = getTileElement(row, col);
            if (isSelected) {
                tileElement.classList.add('tile-shadow-selected');
            } else {
                tileElement.classList.remove('tile-shadow-selected');
            }
        }
        
        // 检查两个位置是否相邻
        function isAdjacent(pos1, pos2) {
            const rowDiff = Math.abs(pos1.row - pos2.row);
            const colDiff = Math.abs(pos1.col - pos2.col);
            return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        }
        
        // 交换两个图案
        function swapTiles(pos1, pos2) {
            // 交换数据
            const temp = gameState.board[pos1.row][pos1.col];
            gameState.board[pos1.row][pos1.col] = gameState.board[pos2.row][pos2.col];
            gameState.board[pos2.row][pos2.col] = temp;
            
            // 更新UI
            updateTileUI(pos1.row, pos1.col);
            updateTileUI(pos2.row, pos2.col);
        }
        
        // 更新图案UI
        function updateTileUI(row, col) {
            const tileElement = getTileElement(row, col);
            const type = gameState.board[row][col];
            tileElement.innerHTML = icons[type];
        }
        
        // 找到所有匹配
        function findMatches() {
            const matches = [];
            
            // 检查水平匹配
            for (let row = 0; row < config.rows; row++) {
                let col = 0;
                while (col < config.cols - 2) {
                    const currentType = gameState.board[row][col];
                    if (currentType === gameState.board[row][col + 1] && 
                        currentType === gameState.board[row][col + 2]) {
                        
                        let matchLength = 3;
                        let nextCol = col + 3;
                        
                        // 检查是否有更长的匹配
                        while (nextCol < config.cols && gameState.board[row][nextCol] === currentType) {
                            matchLength++;
                            nextCol++;
                        }
                        
                        // 记录匹配位置
                        for (let i = 0; i < matchLength; i++) {
                            matches.push({ row, col: col + i });
                        }
                        
                        col = nextCol;
                    } else {
                        col++;
                    }
                }
            }
            
            // 检查垂直匹配
            for (let col = 0; col < config.cols; col++) {
                let row = 0;
                while (row < config.rows - 2) {
                    const currentType = gameState.board[row][col];
                    if (currentType === gameState.board[row + 1][col] && 
                        currentType === gameState.board[row + 2][col]) {
                        
                        let matchLength = 3;
                        let nextRow = row + 3;
                        
                        // 检查是否有更长的匹配
                        while (nextRow < config.rows && gameState.board[nextRow][col] === currentType) {
                            matchLength++;
                            nextRow++;
                        }
                        
                        // 记录匹配位置
                        for (let i = 0; i < matchLength; i++) {
                            matches.push({ row: row + i, col });
                        }
                        
                        row = nextRow;
                    } else {
                        row++;
                    }
                }
            }
            
            return matches;
        }
        
        // 处理匹配（消除并填充新图案）
        function processMatches(matches) {
            if (matches.length === 0) return;
            
            gameState.isProcessing = true;
            
            // 计算分数
            const points = matches.length * config.pointsPerTile;
            gameState.score += points;
            elements.scoreDisplay.textContent = gameState.score;
            
            // 为匹配的图案添加消除动画
            matches.forEach(({ row, col }) => {
                const tileElement = getTileElement(row, col);
                tileElement.classList.add('pop-animation');
            });
            
            // 等待动画完成后移除图案并填充新图案
            setTimeout(() => {
                // 移除匹配的图案
                matches.forEach(({ row, col }) => {
                    gameState.board[row][col] = null;
                    const tileElement = getTileElement(row, col);
                    tileElement.classList.remove('pop-animation');
                });
                
                // 填充新图案
                fillEmptySpaces();
                
                // 检查是否有新的匹配
                setTimeout(() => {
                    checkAndRemoveMatches();
                }, 500);
            }, 300);
        }
        
        // 检查并移除匹配
        function checkAndRemoveMatches(initial = false) {
            const matches = findMatches();
            
            if (matches.length > 0) {
                // 如果是初始检查，不加分
                if (!initial) {
                    processMatches(matches);
                } else {
                    // 初始检查，直接移除并填充，不加分
                    matches.forEach(({ row, col }) => {
                        gameState.board[row][col] = null;
                    });
                    
                    fillEmptySpaces();
                    
                    // 递归检查，确保没有初始匹配
                    setTimeout(() => {
                        checkAndRemoveMatches(true);
                    }, 300);
                }
            } else {
                gameState.isProcessing = false;
            }
        }
        
        // 填充空白位置
        function fillEmptySpaces() {
            // 处理每一列
            for (let col = 0; col < config.cols; col++) {
                // 下落现有图案
                for (let row = config.rows - 1; row >= 0; row--) {
                    if (gameState.board[row][col] === null) {
                        // 找到上方第一个非空图案
                        for (let aboveRow = row - 1; aboveRow >= 0; aboveRow--) {
                            if (gameState.board[aboveRow][col] !== null) {
                                // 下落图案
                                gameState.board[row][col] = gameState.board[aboveRow][col];
                                gameState.board[aboveRow][col] = null;
                                
                                // 更新UI
                                updateTileUI(row, col);
                                updateTileUI(aboveRow, col);
                                
                                // 添加下落动画
                                const tileElement = getTileElement(row, col);
                                tileElement.classList.add('slide-down');
                                setTimeout(() => {
                                    tileElement.classList.remove('slide-down');
                                }, 200);
                                
                                break;
                            }
                        }
                    }
                }
                
                // 在顶部填充新图案
                for (let row = 0; row < config.rows; row++) {
                    if (gameState.board[row][col] === null) {
                        gameState.board[row][col] = Math.floor(Math.random() * config.types);
                        updateTileUI(row, col);
                        
                        // 添加下落动画
                        const tileElement = getTileElement(row, col);
                        tileElement.classList.add('slide-down');
                        setTimeout(() => {
                            tileElement.classList.remove('slide-down');
                        }, 200);
                    }
                }
            }
        }
        
        // 启动计时器
        function startTimer() {
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                elements.timeDisplay.textContent = gameState.timeLeft;
                
                // 时间到，游戏结束
                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }
        
        // 结束游戏
        function endGame() {
            clearInterval(gameState.timer);
            gameState.isProcessing = true;
            
            // 显示游戏结束弹窗
            elements.finalScoreDisplay.textContent = gameState.score;
            elements.gameOverModal.classList.remove('hidden');
        }
        
        // 获取图案元素
        function getTileElement(row, col) {
            return elements.gameBoard.querySelector(`[data-row="${row}"][data-col="${col}"]`);
        }
        
        // 事件监听
        elements.restartBtn.addEventListener('click', initGame);
        elements.playAgainBtn.addEventListener('click', initGame);
        
        // 初始化游戏
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
